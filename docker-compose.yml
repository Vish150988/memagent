services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: memagent-postgres
    environment:
      POSTGRES_USER: memagent
      POSTGRES_PASSWORD: memagent
      POSTGRES_DB: memagent
    ports:
      - "5432:5432"
    volumes:
      - MEMAGENT_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memagent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  MEMAGENT_pgdata:
